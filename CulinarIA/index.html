<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
     rel="stylesheet" 
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous">


</head>
<body>

    

    <div class="container text-center" style="max-width: 400px;">
        <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">Nome de usuario</label>
            <input type="text" class="form-control" id="formGroupExampleInput" placeholder="">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">E-mail</label>
            <input type="text" class="form-control" id="formGroupExampleInput2" placeholder="exemplo@email.com">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Senha</label>
            <input type="text" class="form-control" id="formGroupExampleInput2" placeholder="Digite sua senha">
        </div>
        <div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
    </div>

    <p style="text-align: center; color: blue;"></p>
    


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous"></script>

</body>
</html>
